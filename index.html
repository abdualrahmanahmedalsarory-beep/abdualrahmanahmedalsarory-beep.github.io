<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>جنون العظمه | Majesty Madness</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js"
            }
        }
    </script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Cairo', sans-serif;
            background: #f5f7fc;
            color: #1e293b;
            transition: all 0.2s;
            line-height: 1.5;
        }
        :root {
            --bg: #f5f7fc;
            --card: #ffffff;
            --primary: #0f2b3d;
            --accent: #e67e22;
            --accent-hover: #d35400;
            --text-muted: #475569;
            --border: #e2e8f0;
        }
        body.dark { --bg: #0f172a; --card: #1e293b; --text-muted: #94a3b8; --border: #334155; color: #e2e8f0; }
        .container { max-width: 1400px; margin: 0 auto; padding: 0 20px; }
        .navbar {
            background: var(--card);
            box-shadow: 0 2px 12px rgba(0,0,0,0.05);
            position: sticky;
            top: 0;
            z-index: 1000;
            backdrop-filter: blur(4px);
        }
        .nav-flex {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 0;
            flex-wrap: wrap;
        }
        .logo {
            font-size: 1.6rem;
            font-weight: 800;
            color: var(--primary);
        }
        .logo span { color: var(--accent); }
        .nav-links {
            display: flex;
            gap: 1.2rem;
            list-style: none;
            flex-wrap: wrap;
        }
        .nav-links a {
            text-decoration: none;
            font-weight: 600;
            color: inherit;
            transition: 0.2s;
            cursor: pointer;
        }
        .nav-links a:hover, .nav-links a.active { color: var(--accent); }
        .user-area {
            display: flex;
            gap: 12px;
            align-items: center;
        }
        .btn-sm {
            background: var(--accent);
            padding: 6px 14px;
            border-radius: 30px;
            color: white;
            cursor: pointer;
            border: none;
            font-weight: 600;
        }
        .card {
            background: var(--card);
            border-radius: 28px;
            padding: 1.5rem;
            box-shadow: 0 8px 20px rgba(0,0,0,0.03);
            border: 1px solid var(--border);
            margin-bottom: 2rem;
        }
        button, .btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 40px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.2s;
        }
        button.accent { background: var(--accent); }
        .tools-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 1.8rem;
        }
        .tool-card {
            background: var(--card);
            border-radius: 24px;
            padding: 1.5rem;
            border: 1px solid var(--border);
            transition: 0.2s;
        }
        input, textarea, select {
            width: 100%;
            padding: 12px;
            border-radius: 28px;
            border: 1px solid var(--border);
            background: var(--bg);
            margin-top: 6px;
            margin-bottom: 12px;
        }
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }
        .modal-content {
            background: var(--card);
            max-width: 500px;
            width: 90%;
            border-radius: 32px;
            padding: 2rem;
        }
        footer {
            background: var(--card);
            padding: 2rem 0;
            text-align: center;
            border-top: 1px solid var(--border);
            margin-top: 3rem;
        }
        @media (max-width: 768px) {
            .nav-flex { flex-direction: column; gap: 12px; }
            .nav-links { justify-content: center; }
        }
        .command-suggestions {
            font-size: 0.8rem;
            margin-top: 10px;
            color: var(--text-muted);
        }
        pre {
            background: var(--bg);
            padding: 1rem;
            border-radius: 16px;
            overflow-x: auto;
            white-space: pre-wrap;
        }
        .code-analysis {
            background: var(--card);
            border: 1px solid var(--accent);
            border-radius: 20px;
            padding: 1rem;
            margin-top: 1rem;
        }
        .settings-tab {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
            border-bottom: 2px solid var(--border);
            padding-bottom: 0.5rem;
            flex-wrap: wrap;
        }
        .settings-tab button {
            background: none;
            color: var(--text-muted);
            border: none;
            font-size: 0.9rem;
            padding: 0.5rem 1rem;
            border-radius: 30px;
        }
        .settings-tab button.active {
            background: var(--accent);
            color: white;
        }
        .settings-pane {
            display: none;
        }
        .settings-pane.active-pane {
            display: block;
        }
        .back-btn {
            display: inline-block;
            margin-bottom: 1rem;
            background: var(--text-muted);
        }
        .storage-bar-container {
            background: #8B5A2B;
            border-radius: 20px;
            height: 30px;
            width: 100%;
            margin: 15px 0;
            position: relative;
            overflow: hidden;
        }
        .storage-fill {
            height: 100%;
            width: 0%;
            border-radius: 20px;
            transition: width 0.5s;
        }
        .color-legend {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            margin: 10px 0;
            font-size: 12px;
        }
        .color-item {
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .color-box {
            width: 16px;
            height: 16px;
            border-radius: 4px;
        }
    </style>
</head>
<body>
<div class="navbar">
    <div class="container nav-flex">
        <div class="logo" id="siteLogoText">جنون <span>العظمه</span><br><small id="siteSubtitle" style="font-size: 12px;">Majesty Madness</small></div>

</div>
<div class="container" id="appContent" style="margin-top: 2rem;"></div>
<footer>© 2025 جنون العظمه - Majesty Madness - جميع الحقوق محفوظة. تعمل بعض الميزات عبر APIs خارجية.</footer>

<script type="module">
    import * as THREE from 'three';
    window.THREE = THREE;

    // --------------------------- تكوين النظام ---------------------------
    let systemConfig = {
        userLimits: { images: 35, videos: 5, games: 3, arch: 5, voices: 5, other: 1 },
        subscriptions: [
            { name: "شهري", price: 9.99, duration: "شهر" },
            { name: "سنوي", price: 89.99, duration: "سنة" },
            { name: "خمس سنوات", price: 299, duration: "5 سنوات" }
        ],
        firewallMax: 30,
        adultToolsEnabledForRegularUsers: false,
        tools: {
            image_gen: { name: "توليد صور (AI)", category: "adult", limitType: "images", enabled: true, adult: true, realApi: true },
            video_gen: { name: "توليد فيديو (AI)", category: "adult", limitType: "videos", enabled: true, adult: true, realApi: true },
            image_edit: { name: "تعديل الصور (Canvas)", category: "normal", limitType: "images", enabled: true },
            video_edit: { name: "تعديل الفيديو (FFmpeg.wasm)", category: "normal", limitType: "videos", enabled: true },
            game_gen: { name: "تصميم لعبة (HTML5)", category: "normal", limitType: "games", enabled: true },
            arch_gen: { name: "مخطط معماري (Canvas)", category: "normal", limitType: "arch", enabled: true },
            voice_gen: { name: "توليد صوت (Web Audio)", category: "normal", limitType: "voices", enabled: true },
            world_gen: { name: "عالم تفاعلي (Three.js)", category: "normal", limitType: "other", enabled: true }
        },
        siteTexts: {
            mainTitle: "منصة جنون العظمه للذكاء الاصطناعي",
            subTitle: "Majesty Madness",
        },
        colors: { primary: "#0f2b3d", accent: "#e67e22" },
        theme: "light",
        customCodeModifications: [],
        openRouterApiKey: localStorage.getItem('openrouter_api_key') || "",
        openRouterEnabled: false,
        companyName: "جنون العظمه",
        companyNameEn: "Majesty Madness",
        companyLogo: localStorage.getItem('company_logo') || "",
        storageAccounts: [
            { name: "Mega", total: 20, used: 5, color: "#00ff00" },
            { name: "pCloud", total: 10, used: 2, color: "#adff2f" },
            { name: "Icedrive", total: 10, used: 1, color: "#ffff00" },
            { name: "Google Drive", total: 15, used: 8, color: "#ffa500" },
            { name: "TeraBox", total: 1024, used: 500, color: "#ff4500" },
            { name: "MegaTech Photos", total: 100, used: 20, color: "#ff0000" }
        ]
    };

    let currentUser = null;
    let ownerData = null;
    let firewallLevel = 1;
    let firewallBreachAlertSent = false;
    let improvementProposals = [];
    let complaintsList = [];
    let artworks = [];
    let usersDB = [];
    let replicateApiKey = localStorage.getItem('replicate_api_key') || "";
    let createdAIs = JSON.parse(localStorage.getItem('created_ais') || '[]');

    // --------------------------- تحميل وحفظ البيانات ---------------------------
    function loadStorage() {
        let stored = localStorage.getItem('ai_site_data_v10');
        if(stored) {
            let data = JSON.parse(stored);
            currentUser = data.currentUser;
            ownerData = data.ownerData;
            firewallLevel = data.firewallLevel ?? 1;
            firewallBreachAlertSent = data.firewallBreachAlertSent ?? false;
            improvementProposals = data.improvementProposals ?? [];
            complaintsList = data.complaintsList ?? [];
            artworks = data.artworks ?? [];
            usersDB = data.usersDB ?? [];
            systemConfig = { ...systemConfig, ...(data.systemConfig || {}) };
            if (!systemConfig.customCodeModifications) systemConfig.customCodeModifications = [];
            createdAIs = data.createdAIs || [];
        } else {
            improvementProposals = [{ id:1, title:"تطوير خوارزمية الصور", desc:"إضافة فلتر احترافي", status:"pending" }];
        }
        applySystemConfig();
        updateUIafterLogin();
    }
    function saveStorage() {
        localStorage.setItem('ai_site_data_v10', JSON.stringify({
            currentUser, ownerData, firewallLevel, firewallBreachAlertSent,
            improvementProposals, complaintsList, artworks, usersDB,
            systemConfig, createdAIs
        }));
    }
    function applySystemConfig() {
        document.documentElement.style.setProperty('--primary', systemConfig.colors.primary);
        document.documentElement.style.setProperty('--accent', systemConfig.colors.accent);
        if (systemConfig.theme === 'dark') document.body.classList.add('dark');
        else document.body.classList.remove('dark');
        let subtitleSpan = document.getElementById('siteSubtitle');
        if(subtitleSpan) subtitleSpan.innerText = systemConfig.companyNameEn;
        let logoText = document.getElementById('siteLogoText');
        if(logoText) logoText.innerHTML = `${systemConfig.companyName} <span>العظمه</span><br><small>${systemConfig.companyNameEn}</small>`;
        if(systemConfig.companyLogo) {
            let existingLogo = document.getElementById('dynamicLogo');
            if(!existingLogo) {
                let img = document.createElement('img');
                img.id = 'dynamicLogo';
                img.src = systemConfig.companyLogo;
                img.style.height = '40px';
                img.style.marginLeft = '10px';
                logoText?.prepend(img);
            } else {
                existingLogo.src = systemConfig.companyLogo;
            }
        }
    }

    // --------------------------- WebAuthn (بصمة/وجه فقط) ---------------------------
    async function registerOwnerWithBiometric(email, fullName, secretPhrase) {
        if (!window.PublicKeyCredential) { alert("متصفحك لا يدعم WebAuthn."); return false; }
        try {
            const challenge = new Uint8Array(32);
            window.crypto.getRandomValues(challenge);
            const publicKeyCredentialCreationOptions = {
                challenge: challenge,
                rp: { name: "Majesty Madness AI", id: window.location.hostname },
                user: { id: new TextEncoder().encode("owner-majesty"), name: email, displayName: fullName },
                pubKeyCredParams: [{ alg: -7, type: "public-key" }],
                authenticatorSelection: { authenticatorAttachment: "platform", userVerification: "required" },
                timeout: 60000,
            };
            const credential = await navigator.credentials.create({ publicKey: publicKeyCredentialCreationOptions });
            ownerData = {
                email, fullName, secretPhrase,
                credentialId: btoa(String.fromCharCode(...new Uint8Array(credential.rawId))),
                publicKey: btoa(String.fromCharCode(...new Uint8Array(credential.response.getPublicKey()))),
                registered: true
            };
            saveStorage();
            alert("تم تسجيل المالك باستخدام البصمة/الوجه بنجاح!");
            return true;
        } catch (err) { alert("فشل التسجيل: " + err.message); return false; }
    }
    async function authenticateOwnerWithBiometric() {
        if (!ownerData?.credentialId) { alert("لم يتم تسجيل المالك بعد."); return false; }
        if (!window.PublicKeyCredential) { alert("متصفحك لا يدعم WebAuthn"); return false; }
        try {
            const challenge = new Uint8Array(32);
            window.crypto.getRandomValues(challenge);
            const allowCredentials = [{ id: Uint8Array.from(atob(ownerData.credentialId), c => c.charCodeAt(0)), type: "public-key" }];
            await navigator.credentials.get({ publicKey: { challenge, allowCredentials, userVerification: "required", timeout: 60000 } });
            alert("تم التحقق من البصمة/الوجه بنجاح!");
            return true;
        } catch (err) { alert("فشل التحقق البيومتري: " + err.message); return false; }
    }

    // --------------------------- إدارة المستخدمين مع العمر ---------------------------
    function calculateAge(birthDate) {
        const today = new Date();
        const birth = new Date(birthDate);
        let age = today.getFullYear() - birth.getFullYear();
        const m = today.getMonth() - birth.getMonth();
        if (m < 0 || (m === 0 && today.getDate() < birth.getDate())) age--;
        return age;
    }
    function registerNormalUser(name, email, birthDate, provider = "manual") {
        const age = calculateAge(birthDate);
        const isAdult = age >= 18;
        const newUser = {
            id: 'user_' + Date.now(),
            name: name,
            email: email,
            isOwner: false,
            isAdult: isAdult,
            birthDate: birthDate,
            subscription: null,
            limits: { ...systemConfig.userLimits },
            used: { images:0, videos:0, games:0, arch:0, voices:0, other:0 },
            lastReset: Date.now(),
            provider: provider
        };
        usersDB.push(newUser);
        currentUser = newUser;
        saveStorage();
        alert(`مرحباً ${name}! أنت ${isAdult ? 'بالغ (+18)' : 'أقل من 18'}. سيتم عرض الأدوات المناسبة لعمرك.`);
        updateUIafterLogin();
        renderCurrentTab();
    }
    function socialLogin(provider) {
        let modal = document.createElement('div'); modal.className='modal';
        modal.innerHTML = `<div class="modal-content"><h3>تسجيل الدخول عبر ${provider}</h3>
        <label>الاسم:</label><input id="regName" placeholder="الاسم الكامل"><br>
        <label>البريد الإلكتروني:</label><input id="regEmail" placeholder="example@mail.com"><br>
        <label>تاريخ الميلاد (للتأكد من العمر):</label><input id="regBirth" type="date"><br>
        <button id="confirmReg">تسجيل</button><button id="cancelReg">إلغاء</button></div>`;
        document.body.appendChild(modal);
        document.getElementById('confirmReg').onclick = () => {
            let name = document.getElementById('regName').value.trim();
            let email = document.getElementById('regEmail').value.trim();
            let birth = document.getElementById('regBirth').value;
            if(name && email && birth) {
                registerNormalUser(name, email, birth, provider);
                modal.remove();
            } else alert("الرجاء ملء جميع الحقول.");
        };
        document.getElementById('cancelReg').onclick = () => modal.remove();
    }
    function resetDailyIfNeeded(user) {
        if(!user || user.isOwner) return;
        let now = Date.now();
        if(now - user.lastReset > 86400000) {
            user.used = { images:0, videos:0, games:0, arch:0, voices:0, other:0 };
            user.lastReset = now;
            saveStorage();
        }
    }
    function canUse(user, feature, cost=1) {
        if(user?.isOwner) return true;
        if(!user) return false;
        resetDailyIfNeeded(user);
        let remaining = (user.limits[feature] || 0) - (user.used[feature] || 0);
        return remaining >= cost;
    }
    function consume(user, feature, cost=1) {
        if(user?.isOwner) return true;
        user.used[feature] += cost;
        saveStorage();
        return true;
    }
    function showPaymentModal(plan) {
        let modal = document.createElement('div'); modal.className='modal';
        modal.innerHTML = `<div class="modal-content"><h3>اختر طريقة الدفع</h3>
        <button id="payPaypal">PayPal</button> <button id="payStripe">Stripe</button> <button id="payCard">بطاقة ائتمان</button>
        <button id="closePay">إلغاء</button></div>`;
        document.body.appendChild(modal);
        document.getElementById('payPaypal').onclick = () => { alert(`محاكاة الدفع عبر PayPal للباقة: ${plan.name}`); modal.remove(); };
        document.getElementById('payStripe').onclick = () => { alert(`محاكاة الدفع عبر Stripe`); modal.remove(); };
        document.getElementById('payCard').onclick = () => { alert(`محاكاة الدفع ببطاقة ائتمان`); modal.remove(); };
        document.getElementById('closePay').onclick = () => modal.remove();
    }

    // --------------------------- فهم الأوامر العربية مع OpenRouter ---------------------------
    async function understandArabicWithAI(command) {
        if (!systemConfig.openRouterApiKey) {
            return "مفتاح OpenRouter غير موجود. الرجاء إدخاله في لوحة المالك.";
        }
        try {
            const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                method: "POST",
                headers: {
                    "Authorization": `Bearer ${systemConfig.openRouterApiKey}`,
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    model: "google/gemini-2.0-flash-exp:free",
                    messages: [{ 
                        role: "user", 
                        content: `أنت مساعد ذكي متخصص في البرمجة والذكاء الاصطناعي. قم بتحليل الأمر التالي وتنفيذه. يجب أن يكون الرد فقط كود HTML/CSS/JavaScript قابل للتطبيق مباشرة على صفحة الويب الحالية. لا تكتب أي شرح أو نص خارج الكود. الأمر: ${command}`
                    }],
                    temperature: 0.7,
                    max_tokens: 1000
                })
            });
            const data = await response.json();
            if (data.choices && data.choices[0]) {
                let code = data.choices[0].message.content;
                code = code.replace(/```html/g, '').replace(/```javascript/g, '').replace(/```/g, '').trim();
                return code;
            }
            return "لم أفهم الأمر بوضوح.";
        } catch(e) { return "خطأ في الاتصال بـ OpenRouter: " + e.message; }
    }

    // --------------------------- الكروم + سينكو(1) ---------------------------
    async function analyzeWithSinco(input) {
        if (systemConfig.openRouterApiKey && systemConfig.openRouterEnabled) {
            const aiResponse = await understandArabicWithAI(input);
            return { type: "command", result: { generatedCode: aiResponse, type: "JS", explanation: aiResponse, success: true } };
        }
        const lower = input.toLowerCase();
        if (lower.includes("أضف") && lower.includes("زر")) return { type: "command", result: { generatedCode: `<button style="background:#e67e22;">زر</button>`, type: "HTML", explanation: "تم إنشاء زر.", success: true } };
        return { type: "unknown", message: "فعّل مفتاح OpenRouter في لوحة المالك لفهم عربي عميق." };
    }

    function applyCodeModification(code, type) {
        if (type === "CSS") {
            const style = document.createElement('style');
            style.textContent = code;
            document.head.appendChild(style);
            systemConfig.customCodeModifications.push({ type: "CSS", code: code, applied: true, timestamp: Date.now() });
            saveStorage();
            return "تم إضافة CSS إلى الصفحة.";
        } else if (type === "JS") {
            try {
                const script = document.createElement('script');
                script.textContent = code;
                document.body.appendChild(script);
                systemConfig.customCodeModifications.push({ type: "JS", code: code, applied: true, timestamp: Date.now() });
                saveStorage();
                return "تم تنفيذ كود JavaScript.";
            } catch(e) { return "خطأ في تنفيذ JS: "+e.message; }
        } else if (type === "HTML") {
            const div = document.createElement('div');
            div.innerHTML = code;
            document.body.appendChild(div);
            systemConfig.customCodeModifications.push({ type: "HTML", code: code, applied: true, timestamp: Date.now() });
            saveStorage();
            return "تم إضافة HTML إلى الصفحة.";
        } else {
            return "نوع الكود غير مدعوم للتطبيق التلقائي.";
        }
    }

    function renderCodeModsList(containerId) {
        const container = document.getElementById(containerId);
        if(!container) return;
        const mods = systemConfig.customCodeModifications || [];
        if(mods.length === 0) {
            container.innerHTML = "<p>لا توجد تعديلات كود محفوظة.</p>";
            return;
        }
        container.innerHTML = mods.map((mod, idx) => `
            <div class="card" style="margin-bottom:10px;">
                <strong>${mod.type}</strong> - تم التطبيق في ${new Date(mod.timestamp).toLocaleString()}
                <pre>${mod.code.substring(0,200)}${mod.code.length>200 ? '...' : ''}</pre>
                <button data-idx="${idx}" class="removeModBtn">❌ حذف هذا التعديل</button>
            </div>
        `).join('');
        document.querySelectorAll('.removeModBtn').forEach(btn => {
            btn.onclick = () => {
                const idx = parseInt(btn.dataset.idx);
                systemConfig.customCodeModifications.splice(idx,1);
                saveStorage();
                renderCodeModsList(containerId);

    function exportFullSite() {
        try {
            const fullHtml = document.documentElement.outerHTML;
            const blob = new Blob([fullHtml], { type: 'text/html' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'index.html';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            const sizeInKB = (blob.size / 1024).toFixed(2);
            const sizeInMB = (blob.size / (1024 * 1024)).toFixed(2);
            alert(`✅ تم تصدير الموقع بنجاح!\n📦 حجم الملف: ${sizeInKB} كيلوبايت (${sizeInMB} ميجابايت)`);

        }
    }

    async function searchWithZeno(query) {
        try {
            const response = await fetch(`https://api.duckduckgo.com/?q=${encodeURIComponent(query)}&format=json&no_html=1&skip_disambig=1`);
            const data = await response.json();
            if (data.AbstractText) {
                return data.AbstractText + (data.AbstractURL ? `\nالمصدر: ${data.AbstractURL}` : "");
            } else if (data.RelatedTopics && data.RelatedTopics.length > 0) {
                return data.RelatedTopics[0].Text || "لم أجد نتائج واضحة.";
            }
            return "لم أجد معلومات كافية عن هذا الموضوع.";
        } catch(e) { return "خطأ في الاتصال بمحرك البحث: " + e.message; }
    }

    async function generateRealImage(promptText) {
        if (!replicateApiKey) {
            alert("الرجاء إدخال مفتاح Replicate API في لوحة المالك أولاً.");
            return null;
        }
        try {
            const response = await fetch("https://api.replicate.com/v1/predictions", {
                method: "POST",
                headers: { "Authorization": `Token ${replicateApiKey}`, "Content-Type": "application/json" },
                body: JSON.stringify({
                    version: "stability-ai/sdxl:39ed52f2a78e934b3ba6e2a89f5b1c712de7dfea535525255b1aa35c5565e08b",
                    input: { prompt: promptText, width: 512, height: 512 }
                })
            });
            const data = await response.json();
            let result = await waitForReplicate(data.urls.get);
            return result.output;
        } catch(e) { alert("خطأ: "+e.message); return null; }
    }
    async function waitForReplicate(getUrl) {
        for(let i=0;i<60;i++) {
            await new Promise(r => setTimeout(r, 2000));
            let res = await fetch(getUrl);
            let data = await res.json();
            if(data.status === "succeeded") return data;
            if(data.status === "failed") throw new Error("فشل التوليد");
        }
        throw new Error("انتهى الوقت");
    }

    // --------------------------- أدوات الموقع ---------------------------
    function editImageWithCanvas(file, filterType) {
        return new Promise((resolve) => {
            const img = new Image();
            img.onload = () => {
                const canvas = document.createElement('canvas');
                canvas.width = img.width;
                canvas.height = img.height;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0);
                if(filterType === 'grayscale') {
                    const imageData = ctx.getImageData(0,0,canvas.width,canvas.height);
                    for(let i=0;i<imageData.data.length;i+=4) {
                        let avg = (imageData.data[i]+imageData.data[i+1]+imageData.data[i+2])/3;
                        imageData.data[i]=avg; imageData.data[i+1]=avg; imageData.data[i+2]=avg;
                    }
                    ctx.putImageData(imageData,0,0);
                }
                canvas.toBlob(blob => resolve(URL.createObjectURL(blob)));
            };
            img.src = URL.createObjectURL(file);
        });
    }

            const canvas = document.getElementById('snakeCanvas');

    function drawArchitecture() {
        const canvas = document.createElement('canvas');
        canvas.width = 500;
        canvas.height = 400;
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = '#f0f0f0';
        ctx.fillRect(0,0,canvas.width,canvas.height);
        ctx.fillStyle = '#8B4513';
        ctx.fillRect(50,200,120,80);
        ctx.fillStyle = '#A0522D';
        ctx.fillRect(200,150,100,130);

    function generateBeep() {
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const oscillator = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        oscillator.connect(gain);
        gain.connect(audioCtx.destination);
        oscillator.frequency.value = 440;
        gain.gain.value = 0.5;
        oscillator.start();
        setTimeout(() => oscillator.stop(), 500);
    }
    function create3DWorld(containerId) {
        const container = document.getElementById(containerId);
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, container.clientWidth/container.clientHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer();
        renderer.setSize(container.clientWidth, container.clientHeight);
        container.appendChild(renderer.domElement);
        const geometry = new THREE.BoxGeometry();
        const material = new THREE.MeshStandardMaterial({ color: 0x00ff00 });
        const cube = new THREE.Mesh(geometry, material);
        scene.add(cube);
        camera.position.z = 5;
        function animate() { requestAnimationFrame(animate); cube.rotation.x += 0.01; cube.rotation.y += 0.01; renderer.render(scene, camera); }
        animate();
    }

    function getVisibleTools() {
        const visible = [];
        for (const [key, tool] of Object.entries(systemConfig.tools)) {
            if (!tool.enabled) continue;
            if (currentUser?.isOwner) {
                visible.push({ key, ...tool });
                continue;
            }
            if (tool.adult) {
                if (currentUser?.isAdult && systemConfig.adultToolsEnabledForRegularUsers) {
                    visible.push({ key, ...tool });
                }
            } else {
                visible.push({ key, ...tool });
            }
        }
        return visible;
    }

    async function handleToolAction(toolKey) {
        const tool = systemConfig.tools[toolKey];
        if (!tool) return;
        if (!canUse(currentUser, tool.limitType, 1)) {
            alert("لقد استنفذت حصتك اليومية، انتظر 24 ساعة أو اشترك.");
            return;
        }
        consume(currentUser, tool.limitType, 1);
        let resultDiv = document.getElementById(`result-${toolKey}`);
        resultDiv.innerHTML = `<p>جاري التنفيذ...</p>`;

        try {
            if (toolKey === 'image_gen') {
                const userPrompt = prompt("أدخل وصف الصورة:");
                if (userPrompt) {
                    const imgUrl = await generateRealImage(userPrompt);
                    if (imgUrl) resultDiv.innerHTML = `<img src="${imgUrl}" width="100%">`;
                    else resultDiv.innerHTML = `<p>فشل التوليد. تأكد من مفتاح API.</p>`;
                } else resultDiv.innerHTML = `<p>تم الإلغاء.</p>`;
            }
            else if (toolKey === 'image_edit') {
                const fileInput = document.createElement('input');
                fileInput.type = 'file';
                fileInput.accept = 'image/*';
                fileInput.onchange = async (e) => {
                    const file = e.target.files[0];
                    const newUrl = await editImageWithCanvas(file, 'grayscale');
                    resultDiv.innerHTML = `<img src="${newUrl}" width="100%"><br><button onclick="downloadImage('${newUrl}')">تحميل</button>`;
                };
                fileInput.click();
            }
            else if (toolKey === 'game_gen') {
                const gameHtml = generateSimpleGame();
                resultDiv.innerHTML = gameHtml;
            }
            else if (toolKey === 'arch_gen') {
                const imgData = drawArchitecture();
                resultDiv.innerHTML = `<img src="${imgData}" width="100%">`;
            }
            else if (toolKey === 'voice_gen') {
                generateBeep();
                resultDiv.innerHTML = `<p>تم تشغيل صوت تنبيه (تردد 440Hz)</p>`;
            }
            else if (toolKey === 'world_gen') {
                const container = document.createElement('div');
                container.style.width = '100%';
                container.style.height = '300px';
                resultDiv.innerHTML = '';
                resultDiv.appendChild(container);
                create3DWorld(container.id = `world-${Date.now()}`);
            }
            else if (toolKey === 'video_gen') {
                alert("توليد الفيديو عبر Replicate API يحتاج إلى نموذج فيديو. حالياً تم المحاكاة.");
                resultDiv.innerHTML = `<p>✅ تم توليد فيديو تجريبي (محاكاة) يمكنك ربطه بـ Replicate لاحقاً.</p>`;
            }
            else {
                resultDiv.innerHTML = `<p>✅ تم تنفيذ ${tool.name} بنجاح (محاكاة).</p>`;
            }
        } catch(err) {
            resultDiv.innerHTML = `<p>خطأ: ${err.message}</p>`;
        }
    }

        let html = "";
        for(const [key, val] of Object.entries(texts)) {
            html += `<label>${key}:</label><input id="edit_${key}" value="${val}" style="width:100%; margin-bottom:10px;"><br>`;
        }
        document.getElementById('textEditorFields').innerHTML = html;
        document.getElementById('saveTextEdits')?.addEventListener('click', () => {
            systemConfig.siteTexts.mainTitle = document.getElementById('edit_mainTitle').value;
            systemConfig.siteTexts.subTitle = document.getElementById('edit_subTitle').value;
            saveStorage();
            applySystemConfig();
            alert("تم حفظ التغييرات. أعد تحميل الصفحة لرؤيتها.");
        });
    }

    function renderAppBuilderInside(container) {
        container.innerHTML = `
            <h3>📱 إنشاء تطبيقات - تحويل الموقع إلى تطبيق</h3>
            <p>قم بتنزيل نسخة خفيفة من موقعك كتطبيق (PWA) أو قم بإنشاء تطبيق جديد تم إنشاؤه عبر الموقع.</p>
            <button id="downloadPwaBtn" class="accent">📲 تنزيل تطبيق الموقع (PWA)</button>
            <button id="createNewAppBtn">إنشاء تطبيق جديد (محاكاة)</button>
            <div id="appBuildResult"></div>
        `;
        document.getElementById('downloadPwaBtn')?.addEventListener('click', () => {
            alert("سيتم تنزيل ملف PWA تجريبي (محاكاة). في الواقع، تحتاج إلى إعداد Service Worker وملف manifest.json.");
            window.location.href = "data:application/octet-stream;base64," + btoa("تطبيق وهمي");
        });
        document.getElementById('createNewAppBtn')?.addEventListener('click', () => {
            document.getElementById('appBuildResult').innerHTML = "<p>✅ تم إنشاء تطبيق وهمي جديد (محاكاة). يمكنك تنزيله عبر رابط وهمي.</p>";
        });
    }

    function renderCompanyInside(container) {
        container.innerHTML = `
            <h3>🔧 إعدادات الشركة - تعديل الاسم والشعار</h3>
            <label>اسم الشركة (عربي):</label><input id="companyNameAr" value="${systemConfig.companyName}"><br>
            <label>اسم الشركة (إنجليزي):</label><input id="companyNameEn" value="${systemConfig.companyNameEn}"><br>
            <label>رفع شعار جديد:</label><input type="file" id="logoUpload" accept="image/*"><br>
            <button id="saveCompanySettings" class="accent">حفظ الإعدادات</button>
            <div id="companyResult"></div>
        `;
        document.getElementById('saveCompanySettings')?.addEventListener('click', () => {
            systemConfig.companyName = document.getElementById('companyNameAr').value;
            systemConfig.companyNameEn = document.getElementById('companyNameEn').value;
            const fileInput = document.getElementById('logoUpload');
            if(fileInput.files.length > 0) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    systemConfig.companyLogo = e.target.result;
                    localStorage.setItem('company_logo', systemConfig.companyLogo);
                    saveStorage();
                    applySystemConfig();
                    alert("تم حفظ إعدادات الشركة والشعار.");
                };
                reader.readAsDataURL(fileInput.files[0]);
            } else {
                saveStorage();
                applySystemConfig();
                alert("تم حفظ إعدادات الشركة.");
            }
        });
    }

    function renderNarutoInside(container) {
        container.innerHTML = `
            <h3>🍥 ناروتوا - تطوير الذكاءات والنظام</h3>
            <div id="whatsappSimPanel" style="margin-bottom:20px;"></div>
            <div id="narutoProposals"></div>
        `;
        renderWhatsappPanel();
        const propDiv = document.getElementById('narutoProposals');
        if(propDiv) propDiv.innerHTML = improvementProposals.map(p=>`<div>${p.title} - ${p.desc} <button data-id="${p.id}" class="approveProp">✅ قبول</button> <button data-id="${p.id}" class="rejectProp">❌ رفض</button></div>`).join('');
        document.querySelectorAll('.approveProp').forEach(btn=>{ btn.onclick=()=>{ let id=parseInt(btn.dataset.id); let p=improvementProposals.find(p=>p.id===id); if(p){ p.status='approved'; alert(`تم تطوير: ${p.title}`); notifyOwnerViaWhatsapp(`تم تطوير: ${p.title}`); saveStorage(); renderNarutoInside(container);} }; });
        document.querySelectorAll('.rejectProp').forEach(btn=>{ btn.onclick=()=>{ let id=parseInt(btn.dataset.id); let idx=improvementProposals.findIndex(p=>p.id===id); if(idx!==-1){ improvementProposals.splice(idx,1); alert("تم رفض الاقتراح."); saveStorage(); renderNarutoInside(container);} }; });
    }

    // --------------------------- تسجيل الدخول ---------------------------
    function renderCurrentTab() {
        let active = document.querySelector('.nav-links a.active')?.dataset.tab || 'home';
        const contentDiv = document.getElementById('appContent');
        if(!contentDiv) return;
        if(active === 'home') renderHome(contentDiv);
        else if(active === 'tools') renderTools(contentDiv);
        else if(active === 'rafitalia') renderRafitalia(contentDiv);
        else if(active === 'complaint') renderComplaint(contentDiv);
        else if(active === 'market') renderMarket(contentDiv);
        else if(active === 'settings') renderSettings(contentDiv);
        else if(active === 'ownerSettings') renderOwnerSettings(contentDiv);
    }

    function updateUIafterLogin() {
        let displaySpan = document.getElementById('userDisplayName');
        if(currentUser) displaySpan.innerText = currentUser.name;
        else displaySpan.innerText = "زائر";
        let loginBtn = document.getElementById('loginBtn');
        if(currentUser) {
            loginBtn.innerText = "تسجيل خروج";
            loginBtn.onclick = () => { currentUser=null; saveStorage(); updateUIafterLogin(); renderCurrentTab(); };
        } else {
            loginBtn.innerText = "تسجيل دخول";
            loginBtn.onclick = () => {
                let modal = document.createElement('div'); modal.className='modal';
                modal.innerHTML=`<div class="modal-content"><h3>تسجيل الدخول</h3>
                <button id="googleLogin">Google</button><button id="fbLogin">Facebook</button>
                <button id="ownerRegister">🔐 تسجيل المالك (بصمة/وجه)</button>
                <button id="ownerLogin">🔑 دخول المالك (بصمة/وجه)</button>
                <button id="closeSoc">إلغاء</button></div>`;
                document.body.appendChild(modal);
                document.getElementById('googleLogin').onclick=()=>{ socialLogin('Google'); modal.remove(); };
                document.getElementById('fbLogin').onclick=()=>{ socialLogin('Facebook'); modal.remove(); };
                document.getElementById('ownerRegister').onclick=async ()=>{
                    let email = prompt("أدخل بريد المالك");
                    let fullName = prompt("الاسم الكامل");
                    let secret = prompt("الجملة السرية (للمالك)");
                    if(email && fullName && secret) {
                        let success = await registerOwnerWithBiometric(email, fullName, secret);
                        if(success) {
                            currentUser = { id:'owner', name:fullName, email:email, isOwner:true, isAdult:true, subscription:'lifetime', limits:{}, used:{}, lastReset:Date.now() };
                            usersDB.push(currentUser);
                            saveStorage();
                            modal.remove();
                            updateUIafterLogin();
                            renderCurrentTab();
                        }
                    }
                };
                document.getElementById('ownerLogin').onclick=async ()=>{
                    let authenticated = await authenticateOwnerWithBiometric();
                    if(authenticated && ownerData) {
                        let enteredSecret = prompt("أدخل الجملة السرية:");
                        if(enteredSecret === ownerData.secretPhrase) {
                            currentUser = { id:'owner', name:ownerData.fullName, email:ownerData.email, isOwner:true, isAdult:true, subscription:'lifetime', limits:{}, used:{}, lastReset:Date.now() };
                            saveStorage();
                            modal.remove();
                            updateUIafterLogin();
                            renderCurrentTab();
                        } else { alert("الجملة السرية غير صحيحة."); }
                    } else alert("فشل التحقق البيومتري أو لم يتم التسجيل بعد.");
                };
                document.getElementById('closeSoc').onclick=()=>modal.remove();
            };
        }
        let ownerTab = document.getElementById('ownerPanelTab');
        if(currentUser?.isOwner) ownerTab.style.display = 'block';
        else ownerTab.style.display = 'none';
    }

    function initApp() {
        const tempCode = localStorage.getItem('tempSiteCode');
        if(tempCode && confirm("يوجد كود مؤقت محفوظ. هل تريد تطبيقه وإعادة التحميل؟")) {
            localStorage.removeItem('tempSiteCode');
            document.open();
            document.write(tempCode);
            document.close();
            return;
        }
        loadStorage();
        renderCurrentTab();
        document.querySelectorAll('[data-tab]').forEach(tab=>{
            tab.addEventListener('click',(e)=>{
                document.querySelectorAll('[data-tab]').forEach(t=>t.classList.remove('active'));
                tab.classList.add('active');
                renderCurrentTab();
            });
        });
        window.showPaymentModal = showPaymentModal;
        window.downloadImage = (url) => {
            const a = document.createElement('a');
            a.href = url;
            a.download = 'edited_image.png';
            a.click();
        };
    }
    initApp();
</script>
</body>
</html>
