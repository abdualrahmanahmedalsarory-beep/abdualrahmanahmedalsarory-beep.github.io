    // --------------------------- WebAuthn للمالك ---------------------------
    async function registerOwnerWithBiometric(email, fullName, secretPhrase) {
        if (!window.PublicKeyCredential) { alert("متصفحك لا يدعم WebAuthn."); return false; }
        try {
            const challenge = new Uint8Array(32);
            window.crypto.getRandomValues(challenge);
            const publicKeyCredentialCreationOptions = {
                challenge: challenge,
                rp: { name: "Madness of Greatness", id: window.location.hostname },
                user: { id: new TextEncoder().encode("owner-mog"), name: email, displayName: fullName },
                pubKeyCredParams: [{ alg: -7, type: "public-key" }],
                authenticatorSelection: { authenticatorAttachment: "platform", userVerification: "required" },
                timeout: 60000,
            };
            const credential = await navigator.credentials.create({ publicKey: publicKeyCredentialCreationOptions });
            ownerData = {
                email, fullName, secretPhrase,
                credentialId: btoa(String.fromCharCode(...new Uint8Array(credential.rawId))),
                publicKey: btoa(String.fromCharCode(...new Uint8Array(credential.response.getPublicKey()))),
                registered: true
            };
            saveStorage();
            alert("تم تسجيل المالك باستخدام البصمة/الوجه بنجاح!");
            return true;
        } catch (err) { alert("فشل التسجيل: " + err.message); return false; }
    }
    async function authenticateOwnerWithBiometric() {
        if (!ownerData?.credentialId) { alert("لم يتم تسجيل المالك بعد."); return false; }
        if (!window.PublicKeyCredential) { alert("متصفحك لا يدعم WebAuthn"); return false; }
        try {
            const challenge = new Uint8Array(32);
            window.crypto.getRandomValues(challenge);
            const allowCredentials = [{ id: Uint8Array.from(atob(ownerData.credentialId), c => c.charCodeAt(0)), type: "public-key" }];
            await navigator.credentials.get({ publicKey: { challenge, allowCredentials, userVerification: "required", timeout: 60000 } });
            alert("تم التحقق من البصمة/الوجه بنجاح!");
            return true;
        } catch (err) { alert("فشل التحقق البيومتري: " + err.message); return false; }
    }

    // --------------------------- إدارة المستخدمين والحسابات ---------------------------
    function calculateAge(birthDate) {
        const today = new Date();
        const birth = new Date(birthDate);
        let age = today.getFullYear() - birth.getFullYear();
        const m = today.getMonth() - birth.getMonth();
        if (m < 0 || (m === 0 && today.getDate() < birth.getDate())) age--;
        return age;
    }
    function registerNormalUser(name, email, birthDate, provider = "manual") {
        const age = calculateAge(birthDate);
        const isAdult = age >= 18;
        const newUser = {
            id: 'user_' + Date.now(),
            name: name,
            email: email,
            isOwner: false,
            isAdult: isAdult,
            birthDate: birthDate,
            subscription: null,
            limits: { ...systemConfig.userLimits },
            used: { images:0, videos:0, games:0, arch:0, voices:0, other:0 },
            lastReset: Date.now(),
            provider: provider
        };
        usersDB.push(newUser);
        currentUser = newUser;
        saveStorage();
        alert(`مرحباً ${name}! أنت ${isAdult ? 'بالغ (+18)' : 'أقل من 18'}. سيتم عرض الأدوات المناسبة لعمرك.`);
        updateUIafterLogin();

        document.body.appendChild(modal);
        document.getElementById('confirmReg').onclick = () => {
            let name = document.getElementById('regName').value.trim();

                modal.remove();
            } else alert("الرجاء ملء جميع الحقول.");
        };
        document.getElementById('cancelReg').onclick = () => modal.remove();
    }
    function resetDailyIfNeeded(user) {
        if(!user || user.isOwner) return;
        let now = Date.now();
        if(now - user.lastReset > 86400000) {
            user.used = { images:0, videos:0, games:0, arch:0, voices:0, other:0 };
            user.lastReset = now;
            saveStorage();
        }
    }
    function canUse(user, feature, cost=1) {
        if(user?.isOwner) return true;
        if(!user) return false;
        resetDailyIfNeeded(user);
        let remaining = (user.limits[feature] || 0) - (user.used[feature] || 0);
        return remaining >= cost;
    }
    function consume(user, feature, cost=1) {
        if(user?.isOwner) return true;
        user.used[feature] += cost;
        saveStorage();
        return true;
    }

    // --------------------------- الذكاءات الأساسية ---------------------------
    async function understandArabicWithAI(command, context = "") {
        if (!systemConfig.openRouterApiKey) {
            return "مفتاح OpenRouter غير موجود. الرجاء إدخاله في لوحة المالك.";
        }
        try {
            const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                method: "POST",
                headers: {
                    "Authorization": `Bearer ${systemConfig.openRouterApiKey}`,
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    model: "google/gemini-2.0-flash-exp:free",
                    messages: [{ 
                        role: "user", 
                        content: `أنت مساعد ذكي متخصص في البرمجة والذكاء الاصطناعي. قم بتحليل الأمر التالي وتنفيذه. يجب أن يكون الرد فقط كود HTML/CSS/JavaScript قابل للتطبيق مباشرة على صفحة الويب الحالية. لا تكتب أي شرح أو نص خارج الكود. الأمر: ${command} ${context ? `السياق: ${context}` : ''}`
                    }],
                    temperature: 0.7,
                    max_tokens: 1000
                })
            });
            const data = await response.json();
            if (data.choices && data.choices[0]) {
                let code = data.choices[0].message.content;
                code = code.replace(/```html/g, '').replace(/```javascript/g, '').replace(/```/g, '').trim();
                return code;
            }
            return "لم أفهم الأمر بوضوح.";

    async function searchWithZeno(query) {

            const data = await response.json();
            if (data.AbstractText) {
                return data.AbstractText + (data.AbstractURL ? `\nالمصدر: ${data.AbstractURL}` : "");
            } else if (data.RelatedTopics && data.RelatedTopics.length > 0) {
                return data.RelatedTopics[0].Text || "لم أجد نتائج واضحة.";
            }
            return "لم أجد معلومات كافية عن هذا الموضوع.";
        } catch(e) { return "خطأ في الاتصال بمحرك البحث: " + e.message; }
    }

                    input: { prompt: promptText, width: 512, height: 512 }

    async function waitForReplicate(getUrl) {
        for(let i=0;i<60;i++) {
            await new Promise(r => setTimeout(r, 2000));
            let res = await fetch(getUrl);
            let data = await res.json();
            if(data.status === "succeeded") return data;
            if(data.status === "failed") throw new Error("فشل التوليد");
        }
        throw new Error("انتهى الوقت");
    }

    function editImageWithCanvas(file, filterType) {
        return new Promise((resolve) => {
            const img = new Image();
            img.onload = () => {
                const canvas = document.createElement('canvas');
                canvas.width = img.width;
                canvas.height = img.height;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0);
                if(filterType === 'grayscale') {
                    const imageData = ctx.getImageData(0,0,canvas.width,canvas.height);
                    for(let i=0;i<imageData.data.length;i+=4) {
                        let avg = (imageData.data[i]+imageData.data[i+1]+imageData.data[i+2])/3;
                        imageData.data[i]=avg; imageData.data[i+1]=avg; imageData.data[i+2]=avg;
                    }
                    ctx.putImageData(imageData,0,0);
                }
                canvas.toBlob(blob => resolve(URL.createObjectURL(blob)));
            };
            img.src = URL.createObjectURL(file);
        });
    }

    function generateBeep() {
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const oscillator = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        oscillator.connect(gain);
        gain.connect(audioCtx.destination);
        oscillator.frequency.value = 440;
        gain.gain.value = 0.5;
        oscillator.start();
        setTimeout(() => oscillator.stop(), 500);
    }

            "Python": { size: "12 MB", fullData: "مكتبات بايثون الأساسية" },
            "JavaScript": { size: "8 MB", fullData: "مكتبات JS ووثائق" }
        };
        for(let [key, val] of Object.entries(languageDB)) {
            if(query.includes(key) || key.includes(query)) {
                return { found: true, name: key, size: val.size, data: val.fullData };
            }
        }
        return { found: false, message: "لم نجد اللغة أو اللهجة المطلوبة. حاول كتابة الاسم كاملاً." };
    }

        };

    function renderTeamPanel(div) {
        if(!currentUser?.isOwner) { div.innerHTML = `<div class="card">فقط المالك يمكنه الوصول.</div>`; return; }

    function renderCurrentTab() {
        let active = document.querySelector('.nav-links a.active')?.dataset.tab || 'home';
        const contentDiv = document.getElementById('appContent');
        if(active === 'home') renderHome(contentDiv);
        else if(active === 'tools') renderTools(contentDiv);
        else if(active === 'rafitalia') renderRafitalia(contentDiv);
        else if(active === 'complaint') renderComplaint(contentDiv);
        else if(active === 'market') renderMarket(contentDiv);
        else if(active === 'companyPosts') renderCompanyPosts(contentDiv);
        else if(active === 'settings') renderSettings(contentDiv);
        else if(active === 'ownerSettings') renderOwnerSettings(contentDiv);
        else if(active === 'teamPanel') renderTeamPanel(contentDiv);
    }

    function updateUIafterLogin() {
        let displaySpan = document.getElementById('userDisplayName');
        if(currentUser) displaySpan.innerText = currentUser.name;
        else displaySpan.innerText = "زائر";
        let loginBtn = document.getElementById('loginBtn');
        if(currentUser) {
            loginBtn.innerText = "تسجيل خروج";
            loginBtn.onclick = () => { currentUser=null; saveStorage(); updateUIafterLogin(); renderCurrentTab(); };
        } else {
            loginBtn.innerText = "تسجيل دخول";
            loginBtn.onclick = () => {
                let modal = document.createElement('div'); modal.className='modal';
                modal.innerHTML=`<div class="modal-content"><h3>تسجيل الدخول</h3>
                <button id="googleLogin">Google</button><button id="fbLogin">Facebook</button>
                <button id="ownerRegister">🔐 تسجيل المالك (بصمة/وجه)</button>
                <button id="ownerLogin">🔑 دخول المالك (بصمة/وجه)</button>
                <button id="closeSoc">إلغاء</button></div>`;
                document.body.appendChild(modal);
                document.getElementById('googleLogin').onclick=()=>{ socialLogin('Google'); modal.remove(); };
                document.getElementById('fbLogin').onclick=()=>{ socialLogin('Facebook'); modal.remove(); };
                document.getElementById('ownerRegister').onclick=async ()=>{
                    let email = prompt("أدخل بريد المالك");
                    let fullName = prompt("الاسم الكامل");
                    let secret = prompt("الجملة السرية");
                    if(email && fullName && secret) {
                        await registerOwnerWithBiometric(email, fullName, secret);
                        currentUser = { id:'owner', name:fullName, email:email, isOwner:true, isAdult:true, subscription:'lifetime', limits:{}, used:{}, lastReset:Date.now() };
                        usersDB.push(currentUser);
                        saveStorage();
                        modal.remove();
                        updateUIafterLogin();
                        renderCurrentTab();
                    }
                };
                document.getElementById('ownerLogin').onclick=async ()=>{
                    let authenticated = await authenticateOwnerWithBiometric();
                    if(authenticated && ownerData) {
                        let enteredSecret = prompt("الجملة السرية:");
                        if(enteredSecret === ownerData.secretPhrase) {
                            currentUser = { id:'owner', name:ownerData.fullName, email:ownerData.email, isOwner:true, isAdult:true, subscription:'lifetime', limits:{}, used:{}, lastReset:Date.now() };
                            saveStorage();
                            modal.remove();
                            updateUIafterLogin();
                            renderCurrentTab();
                        } else alert("الجملة السرية غير صحيحة.");
                    } else alert("فشل التحقق");
                };
                document.getElementById('closeSoc').onclick=()=>modal.remove();
            };
        }
        let ownerTab = document.getElementById('ownerPanelTab');
        let teamTab = document.getElementById('teamPanelTab');
        if(currentUser?.isOwner) { ownerTab.style.display = 'block'; teamTab.style.display = 'block'; }
        else { ownerTab.style.display = 'none'; teamTab.style.display = 'none'; }
    }

    function initApp() {
        loadStorage();
        renderCurrentTab();
        document.querySelectorAll('[data-tab]').forEach(tab=>{
            tab.addEventListener('click',(e)=>{
                document.querySelectorAll('[data-tab]').forEach(t=>t.classList.remove('active'));
                tab.classList.add('active');
                renderCurrentTab();
            });
        });
        window.showPaymentModal = showPaymentModal;
        window.downloadImage = (url) => { const a = document.createElement('a'); a.href = url; a.download = 'edited_image.png'; a.click(); };
        if (Notification.permission !== "granted" && Notification.permission !== "denied") Notification.requestPermission();
    }
    initApp();
</script>
